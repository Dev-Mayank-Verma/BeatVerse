name: beatverse
description: "BeatVerse — Music streaming app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  just_audio: ^0.9.42
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.4
  audio_service: ^0.18.15
  uuid: ^4.5.1
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
