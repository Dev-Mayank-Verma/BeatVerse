name: Build BeatVerse APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Scaffold
        run: flutter create --platforms=android --org com.beatverse --project-name beatverse scaffold

      - name: Copy source
        run: |
          rm -rf scaffold/lib
          cp -r repo/lib scaffold/lib
          cp repo/pubspec.yaml scaffold/pubspec.yaml

      - name: Fix Kotlin version with sed
        run: |
          echo "BEFORE:"
          cat scaffold/android/settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' scaffold/android/settings.gradle
          echo "AFTER:"
          cat scaffold/android/settings.gradle

      - name: Fix minSdk with sed
        run: |
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' scaffold/android/app/build.gradle
          sed -i 's/compileSdk [0-9]*/compileSdk 34/' scaffold/android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' scaffold/android/app/build.gradle
          echo "build.gradle:"
          cat scaffold/android/app/build.gradle

      - name: Add permissions to manifest
        run: |
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' scaffold/android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.WAKE_LOCK"/><application|' scaffold/android/app/src/main/AndroidManifest.xml
          echo "Manifest done"

      - name: pub get
        working-directory: scaffold
        run: flutter pub get

      - name: Build APK
        working-directory: scaffold
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: beatverse-apk
          path: scaffold/build/app/outputs/flutter-apk/app-release.apk
