name: Build BeatVerse APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Scaffold
        run: flutter create --platforms=android --org com.beatverse --project-name beatverse scaffold
      - name: Copy source
        run: |
          rm -rf scaffold/lib
          cp -r repo/lib scaffold/lib
          cp repo/pubspec.yaml scaffold/pubspec.yaml
      - name: Fix Kotlin version
        run: |
          python3 << 'PY'
          import re
          path = 'scaffold/android/settings.gradle'
          txt  = open(path).read()
          print("BEFORE:", txt)
          txt  = re.sub(
            r'id\s+"org\.jetbrains\.kotlin\.android"\s+version\s+"[^"]+"',
            'id "org.jetbrains.kotlin.android" version "1.9.24"',
            txt
          )
          open(path,'w').write(txt)
          print("AFTER:", txt)
          PY
      - name: Fix minSdk
        run: |
          python3 << 'PY'
          import re
          path = 'scaffold/android/app/build.gradle'
          txt  = open(path).read()
          txt  = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 21', txt)
          open(path,'w').write(txt)
          print(open(path).read())
          PY
      - name: Write manifest
        run: |
          cat > scaffold/android/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <application
                  android:label="BeatVerse"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          XMLEOF
      - name: pub get
        working-directory: scaffold
        run: flutter pub get
      - name: Build APK
        working-directory: scaffold
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: beatverse-apk
          path: scaffold/build/app/outputs/flutter-apk/app-release.apk
