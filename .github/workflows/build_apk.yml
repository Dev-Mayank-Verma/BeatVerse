name: Build BeatVerse APK

# Runs entirely on GitHub's servers — nothing to install on your phone.
# Push this repo to GitHub (the GitHub mobile app, or the web UI's
# "Add file → Upload files" from a phone browser, both work), then either
# wait for this to run automatically or trigger it manually from the
# Actions tab. Download the finished APK from the same run's "Artifacts"
# section at the bottom of the page.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (lib/ + pubspec.yaml)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # This repo only ships lib/ + pubspec.yaml (no android/ios folders —
      # those need a machine with the Flutter SDK to generate, which this
      # runner has and your phone doesn't). So: scaffold a fresh project
      # here to get real android/ios folders, then drop this repo's
      # actual source on top of it before building.
      - name: Scaffold android/ios platform folders
        run: flutter create --platforms=android --org com.beatverse --project-name beatverse scaffold

      - name: Overlay this repo's source onto the scaffold
        run: |
          rm -rf scaffold/lib
          cp -r repo/lib scaffold/lib
          cp repo/pubspec.yaml scaffold/pubspec.yaml

      # Best-effort native wiring for audio_service's background playback
      # notification. audio_service's own plugin manifest usually merges
      # most of this automatically via Gradle, but permissions are safer
      # added explicitly. If a future audio_service version already
      # covers all of this, these extra lines are harmless no-ops.
      - name: Add audio_service permissions to AndroidManifest.xml
        run: |
          python3 - <<'PY'
          import re
          path = "scaffold/android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              xml = f.read()
          perms = (
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n'
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>\n'
              '    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n'
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n'
          )
          if "FOREGROUND_SERVICE_MEDIA_PLAYBACK" not in xml:
              xml = xml.replace("<manifest ", "<manifest xmlns:tools=\"http://schemas.android.com/tools\" ", 1) if "xmlns:tools" not in xml else xml
              xml = re.sub(r"(<manifest[^>]*>)", r"\1\n" + perms, xml, count=1)
          with open(path, "w") as f:
              f.write(xml)
          PY

      - name: flutter pub get
        working-directory: scaffold
        run: flutter pub get

      - name: Build release APK
        working-directory: scaffold
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beatverse-apk
          path: scaffold/build/app/outputs/flutter-apk/app-release.apk
